<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mi Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg: #EBF2FB;
  --surface: #FFFFFF;
  --border: #BDD4EF;
  --text: #0D1F3C;
  --muted: #5A7A9F;
  --accent: #1A56DB;
  --accent-light: #E0ECFF;
  --danger: #8B2020;
  --danger-light: #F5EAEA;
  --shadow: 0 1px 4px rgba(26,86,219,0.08);
 
  --p-high: #DC2626;
  --p-high-bg: #FEF2F2;
  --p-high-border: #FECACA;
  --p-med: #D97706;
  --p-med-bg: #FFFBEB;
  --p-med-border: #FDE68A;
  --p-low: #059669;
  --p-low-bg: #ECFDF5;
  --p-low-border: #A7F3D0;
}
 
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior: none;
}
 
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.25rem 1.2rem;
  position: sticky;
  top: 0;
  z-index: 10;
}
 
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
}
 
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.3px;
}
 
h1 em {
  font-style: italic;
  color: var(--accent);
}
 
.date-tag {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  margin-top: 0.2rem;
}
 
.stats-row {
  display: flex;
  gap: 0.5rem;
}
 
.stat {
  flex: 1;
  background: var(--bg);
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  text-align: center;
}
 
.stat-n {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  line-height: 1;
  display: block;
}
 
.stat-l {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 500;
  display: block;
  margin-top: 0.15rem;
}
 
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.75rem;
}
 
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}
 
main {
  padding: 1rem 1.25rem 7.5rem;
  max-width: 600px;
  margin: 0 auto;
}
 
.filter-scroll {
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  padding: 0.75rem 0 0.5rem;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
 
.filter-scroll::-webkit-scrollbar { display: none; }
 
.ftab {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.3rem 0.8rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
 
.ftab:hover { color: var(--text); border-color: #aaa; }
.ftab.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
 
.ftab[data-f="p-alta"].active  { background: var(--p-high); border-color: var(--p-high); }
.ftab[data-f="p-media"].active { background: var(--p-med);  border-color: var(--p-med); }
.ftab[data-f="p-baja"].active  { background: var(--p-low);  border-color: var(--p-low); }
 
.section-label {
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 1.2rem 0 0.5rem;
}
 
.task-list { display: flex; flex-direction: column; gap: 0.5rem; }
 
.task-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  animation: fadeIn 0.18s ease;
  box-shadow: var(--shadow);
}
 
/* Priority left border accent */
.task-item[data-priority="alta"]  { border-left: 3px solid var(--p-high); }
.task-item[data-priority="media"] { border-left: 3px solid var(--p-med); }
.task-item[data-priority="baja"]  { border-left: 3px solid var(--p-low); }
 
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}
 
.task-item.done { opacity: 0.45; }
 
.check-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
 
.check-btn:hover, .check-btn:active { border-color: var(--accent); }
 
.check-btn.checked {
  background: var(--accent);
  border-color: var(--accent);
}
 
.check-btn.checked::after {
  content: '';
  display: block;
  width: 5px;
  height: 9px;
  border: 2px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
}
 
.cat-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
 
.task-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
 
.task-text {
  font-size: 0.9rem;
  line-height: 1.4;
}
 
.task-item.done .task-text {
  text-decoration: line-through;
  color: var(--muted);
}
 
/* Priority badge */
.priority-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.15rem 0.45rem;
  border-radius: 20px;
  width: fit-content;
}
 
.priority-badge.alta  { background: var(--p-high-bg);  color: var(--p-high); border: 1px solid var(--p-high-border); }
.priority-badge.media { background: var(--p-med-bg);   color: var(--p-med);  border: 1px solid var(--p-med-border); }
.priority-badge.baja  { background: var(--p-low-bg);   color: var(--p-low);  border: 1px solid var(--p-low-border); }
 
.del-btn {
  background: none;
  border: none;
  color: var(--border);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.1rem 0.25rem;
  border-radius: 4px;
  line-height: 1;
  transition: all 0.15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
 
.del-btn:hover, .del-btn:active { color: var(--danger); background: var(--danger-light); }
 
.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
 
.empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.35; }
.empty p { font-size: 0.85rem; font-weight: 300; }
 
/* Bottom add bar */
.add-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0.75rem 1.25rem;
  padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
  display: flex;
  gap: 0.5rem;
  z-index: 20;
  max-width: 600px;
  margin: 0 auto;
  flex-wrap: wrap;
}
 
.add-bar-row1 {
  display: flex;
  gap: 0.5rem;
  width: 100%;
}
 
.add-bar-row2 {
  display: flex;
  gap: 0.5rem;
  width: 100%;
}
 
.add-bar input[type="text"] {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.85rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  min-width: 0;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
 
.add-bar input[type="text"]:focus { border-color: var(--accent); }
 
.add-bar select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.5rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  text-align: center;
}
 
/* Priority selector styled tabs */
.priority-selector {
  display: flex;
  gap: 0.35rem;
  flex: 1;
}
 
.ptab {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.5rem 0.4rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
 
.ptab:hover { border-color: #aaa; color: var(--text); }
 
.ptab[data-p="alta"].selected  { background: var(--p-high-bg);  color: var(--p-high); border-color: var(--p-high); }
.ptab[data-p="media"].selected { background: var(--p-med-bg);   color: var(--p-med);  border-color: var(--p-med); }
.ptab[data-p="baja"].selected  { background: var(--p-low-bg);   color: var(--p-low);  border-color: var(--p-low); }
.ptab[data-p="none"].selected  { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
 
.btn-add {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 0.65rem 1rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
 
.btn-add:active { opacity: 0.75; }
 
/* Category colors */
.cat-personal  { background: #7C3AED; }
.cat-salud     { background: #059669; }
.cat-trabajo   { background: #1A56DB; }
.cat-hogar     { background: #D97706; }
.cat-finanzas  { background: #0891B2; }
</style>
</head>
<body>
 
<header>
  <div class="header-top">
    <h1>Mi <em>Agenda</em></h1>
    <span class="date-tag" id="date-tag"></span>
  </div>
  <div class="stats-row">
    <div class="stat"><span class="stat-n" id="s-total">0</span><span class="stat-l">Tareas</span></div>
    <div class="stat"><span class="stat-n" id="s-done">0</span><span class="stat-l">Hechas</span></div>
    <div class="stat"><span class="stat-n" id="s-pend">0</span><span class="stat-l">Pendientes</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</header>
 
<main>
  <div class="filter-scroll">
    <button class="ftab active" data-f="all" onclick="setFilter(this)">Todas</button>
    <button class="ftab" data-f="pending" onclick="setFilter(this)">Pendientes</button>
    <button class="ftab" data-f="done" onclick="setFilter(this)">Completadas</button>
    <button class="ftab" data-f="p-alta" onclick="setFilter(this)">🔴 Alta</button>
    <button class="ftab" data-f="p-media" onclick="setFilter(this)">🟡 Media</button>
    <button class="ftab" data-f="p-baja" onclick="setFilter(this)">🟢 Baja</button>
    <button class="ftab" data-f="personal" onclick="setFilter(this)">Personal</button>
    <button class="ftab" data-f="salud" onclick="setFilter(this)">Salud</button>
    <button class="ftab" data-f="trabajo" onclick="setFilter(this)">Trabajo</button>
    <button class="ftab" data-f="hogar" onclick="setFilter(this)">Hogar</button>
    <button class="ftab" data-f="finanzas" onclick="setFilter(this)">Finanzas</button>
  </div>
  <div class="task-list" id="task-list"></div>
</main>
 
<div class="add-bar">
  <div class="add-bar-row1">
    <input type="text" id="task-input" placeholder="Nueva tarea..." maxlength="120">
    <select id="cat-select">
      <option value="personal">🟣 Personal</option>
      <option value="salud">🟢 Salud</option>
      <option value="trabajo">🔵 Trabajo</option>
      <option value="hogar">🟠 Hogar</option>
      <option value="finanzas">🩵 Finanzas</option>
    </select>
    <button class="btn-add" onclick="addTask()">+</button>
  </div>
  <div class="add-bar-row2">
    <div class="priority-selector">
      <button class="ptab" data-p="alta"  onclick="setPriority(this)">🔴 Alta</button>
      <button class="ptab" data-p="media" onclick="setPriority(this)">🟡 Media</button>
      <button class="ptab" data-p="baja"  onclick="setPriority(this)">🟢 Baja</button>
      <button class="ptab selected" data-p="none" onclick="setPriority(this)">— Sin</button>
    </div>
  </div>
</div>
 
<script>
const STORAGE_KEY = 'mi_agenda_tasks';
let tasks = [];
let filter = 'all';
let selectedPriority = 'none';
 
const PRIORITY_ORDER = { alta: 0, media: 1, baja: 2, none: 3, undefined: 3 };
const PRIORITY_LABEL = { alta: 'Alta', media: 'Media', baja: 'Baja' };
 
const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const now = new Date();
document.getElementById('date-tag').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
 
function load() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tasks = []; }
}
 
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}
 
function setPriority(btn) {
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedPriority = btn.dataset.p;
}
 
function addTask() {
  const input = document.getElementById('task-input');
  const cat = document.getElementById('cat-select').value;
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({
    id: Date.now(),
    text,
    category: cat,
    done: false,
    priority: selectedPriority === 'none' ? null : selectedPriority
  });
  save();
  input.value = '';
  render();
  input.focus();
}
 
function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
 
function remove(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}
 
function setFilter(btn) {
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.f;
  render();
}
 
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
 
function priorityBadge(priority) {
  if (!priority) return '';
  const icons = { alta: '🔴', media: '🟡', baja: '🟢' };
  return `<span class="priority-badge ${priority}">${icons[priority]} ${PRIORITY_LABEL[priority]}</span>`;
}
 
function taskHTML(t) {
  const pAttr = t.priority ? `data-priority="${t.priority}"` : '';
  return `<div class="task-item ${t.done ? 'done' : ''}" ${pAttr}>
    <div class="check-btn ${t.done ? 'checked' : ''}" onclick="toggle(${t.id})"></div>
    <div class="cat-dot cat-${t.category}"></div>
    <div class="task-body">
      <span class="task-text">${esc(t.text)}</span>
      ${priorityBadge(t.priority)}
    </div>
    <button class="del-btn" onclick="remove(${t.id})">×</button>
  </div>`;
}
 
function sortByPriority(list) {
  return [...list].sort((a, b) => {
    const pa = PRIORITY_ORDER[a.priority ?? 'none'];
    const pb = PRIORITY_ORDER[b.priority ?? 'none'];
    return pa - pb;
  });
}
 
function render() {
  let list = tasks;
  if (filter === 'done')         list = tasks.filter(t => t.done);
  else if (filter === 'pending') list = tasks.filter(t => !t.done);
  else if (filter === 'p-alta')  list = tasks.filter(t => t.priority === 'alta');
  else if (filter === 'p-media') list = tasks.filter(t => t.priority === 'media');
  else if (filter === 'p-baja')  list = tasks.filter(t => t.priority === 'baja');
  else if (!['all','done','pending'].includes(filter)) list = tasks.filter(t => t.category === filter);
 
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pend').textContent = total - done;
  document.getElementById('progress').style.width = total ? `${Math.round(done/total*100)}%` : '0%';
 
  const el = document.getElementById('task-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">✦</span><p>Nada por aquí todavía</p></div>`;
    return;
  }
 
  const pending   = sortByPriority(list.filter(t => !t.done));
  const completed = sortByPriority(list.filter(t => t.done));
  let html = '';
  if (pending.length)   html += `<p class="section-label">Por hacer · ${pending.length}</p>` + pending.map(taskHTML).join('');
  if (completed.length) html += `<p class="section-label">Completadas · ${completed.length}</p>` + completed.map(taskHTML).join('');
  el.innerHTML = html;
}
 
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
 
load();
render();
</script>
</body>
</html>
